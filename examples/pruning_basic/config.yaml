defaults:
  - override /hydra/sweeper: optuna_reborn

alpha: 1.0
beta: 0.5

hydra:
  mode: MULTIRUN
  sweeper:
    direction: minimize
    n_trials: 30
    n_jobs: 1
    enable_pruning: true
    sampler:
      _target_: optuna.samplers.TPESampler
      seed: 42
    pruner:
      _target_: optuna.pruners.MedianPruner
      n_startup_trials: 5
      n_warmup_steps: 3
    params:
      alpha: tag(log, interval(0.001, 100.0))
      beta: interval(0.0, 1.0)
