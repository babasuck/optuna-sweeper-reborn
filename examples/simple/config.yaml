defaults:
  - override /hydra/sweeper: optuna_reborn

x: 0.0
y: 0.0

hydra:
  mode: MULTIRUN
  sweeper:
    direction: minimize
    n_trials: 20
    n_jobs: 1
    sampler:
      _target_: optuna.samplers.TPESampler
      seed: 42
    params:
      x: interval(-5.0, 5.0)
      y: interval(-5.0, 5.0)
