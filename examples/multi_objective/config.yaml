defaults:
  - override /hydra/sweeper: optuna_reborn
  - override /hydra/sweeper/sampler: nsgaii

x: 0.0
y: 0.0

hydra:
  mode: MULTIRUN
  sweeper:
    direction:
      - minimize
      - minimize
    n_trials: 30
    n_jobs: 1
    sampler:
      seed: 42
      population_size: 20
    params:
      x: interval(0.0, 5.0)
      y: interval(0.0, 3.0)
